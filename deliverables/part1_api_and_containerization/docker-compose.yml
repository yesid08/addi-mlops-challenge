version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: deliverables/part1_api_and_containerization/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
