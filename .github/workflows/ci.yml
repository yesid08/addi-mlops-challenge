name: CI

on:
  push:
    branches: [main, develop, "dev"]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: poetry install

      - name: Run linters
        run: bash scripts/lint.sh

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: poetry install

      - name: Run API tests
        env:
          OPENAI_API_KEY: "sk-fake-for-tests"
        run: poetry run pytest deliverables/part1_api_and_containerization/tests/ -v

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f deliverables/part1_api_and_containerization/Dockerfile \
            -t emporyum-api:ci \
            .
